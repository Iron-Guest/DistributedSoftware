# =====================================================
# 电商秒杀平台 - Docker Compose 编排
# =====================================================
# 启动: docker-compose up -d
# 停止: docker-compose down
# 查看日志: docker-compose logs -f
# =====================================================

services:
  # =====================================================
  # 1. MySQL 数据库
  # =====================================================
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-abc123}
      MYSQL_DATABASE: shopping_platform
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-abc123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - seckill-net

  # =====================================================
  # 2. 后端服务实例 1 (端口 8081)
  # =====================================================
  backend1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend-1
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=shopping_platform
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-abc123}
    ports:
      - "8081:8080"
    networks:
      - seckill-net

  # =====================================================
  # 3. 后端服务实例 2 (端口 8082)
  # =====================================================
  backend2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend-2
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=shopping_platform
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-abc123}
    ports:
      - "8082:8080"
    networks:
      - seckill-net

  # =====================================================
  # 4. Nginx 反向代理 + 前端静态资源
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    restart: unless-stopped
    depends_on:
      - backend1
      - backend2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - seckill-net

# =====================================================
# 数据卷
# =====================================================
volumes:
  mysql-data:
    driver: local

# =====================================================
# 自定义网络
# =====================================================
networks:
  seckill-net:
    driver: bridge