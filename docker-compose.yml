# =====================================================
# 电商秒杀平台 - Docker Compose 编排
# =====================================================
# 启动: docker-compose up -d
# 停止: docker-compose down
# 查看日志: docker-compose logs -f
# =====================================================

services:
  # =====================================================
  # 1. MySQL 主库 (读写)
  # =====================================================
  mysql-master:
    image: mysql:8.0
    container_name: seckill-mysql-master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-abc123}
      MYSQL_DATABASE: shopping_platform
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./src/main/resources/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./mysql/master.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-abc123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - seckill-net

  # =====================================================
  # 2. MySQL 从库 (只读)
  # =====================================================
  mysql-slave:
    image: mysql:8.0
    container_name: seckill-mysql-slave
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-abc123}
      MYSQL_DATABASE: shopping_platform
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3308:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./mysql/slave.cnf:/etc/mysql/conf.d/custom.cnf:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - seckill-net

  # =====================================================
  # 3. MySQL 主从复制初始化
  # =====================================================
  mysql-replication-setup:
    image: mysql:8.0
    container_name: seckill-replication-setup
    restart: "no"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_started
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-abc123}
      - MYSQL_MASTER_HOST=mysql-master
      - MYSQL_SLAVE_HOST=mysql-slave
    volumes:
      - ./mysql/setup-replication.sh:/setup-replication.sh:ro
    entrypoint: ["bash", "/setup-replication.sh"]
    networks:
      - seckill-net

  # =====================================================
  # 4. Redis 缓存
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - seckill-net

  # =====================================================
  # 5. Zookeeper (Kafka 依赖)
  # =====================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: seckill-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - seckill-net

  # =====================================================
  # 6. Kafka 消息队列
  # =====================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: seckill-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - seckill-net

  # =====================================================
  # 7. Elasticsearch 搜索引擎
  # =====================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: seckill-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - seckill-net

  # =====================================================
  # 8. Nacos 服务注册与配置中心
  # =====================================================
  nacos:
    image: nacos/nacos-server:v2.4.3-slim
    container_name: seckill-nacos
    restart: unless-stopped
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - JVM_XMS=256m
      - JVM_XMX=256m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - seckill-net

  # =====================================================
  # 9. Sentinel Dashboard 流量治理控制台
  # =====================================================
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: seckill-sentinel
    restart: unless-stopped
    ports:
      - "8858:8080"
    environment:
      - JAVA_OPTS=-Dserver.port=8080 -Dcsp.sentinel.dashboard.server=localhost:8080 -Dproject.name=sentinel-dashboard
    networks:
      - seckill-net

  # =====================================================
  # 10. Spring Cloud Gateway 网关
  # =====================================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: seckill-gateway
    restart: unless-stopped
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NACOS_ADDR=nacos:8848
      - SENTINEL_DASHBOARD=sentinel-dashboard:8080
      - SENTINEL_PORT=8719
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "9000:9000"
    networks:
      - seckill-net

  # =====================================================
  # 11. 后端服务实例 1 (端口 8081)
  # =====================================================
  backend1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend-1
    restart: unless-stopped
    depends_on:
      mysql-replication-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - WORKER_ID=1
      - MYSQL_MASTER_HOST=mysql-master
      - MYSQL_SLAVE_HOST=mysql-slave
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=shopping_platform
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-abc123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NACOS_ADDR=nacos:8848
      - SENTINEL_DASHBOARD=sentinel-dashboard:8080
      - SENTINEL_PORT=8719
    ports:
      - "8081:8080"
    networks:
      - seckill-net

  # =====================================================
  # 12. 后端服务实例 2 (端口 8082)
  # =====================================================
  backend2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-backend-2
    restart: unless-stopped
    depends_on:
      mysql-replication-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - WORKER_ID=2
      - MYSQL_MASTER_HOST=mysql-master
      - MYSQL_SLAVE_HOST=mysql-slave
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=shopping_platform
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-abc123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NACOS_ADDR=nacos:8848
      - SENTINEL_DASHBOARD=sentinel-dashboard:8080
      - SENTINEL_PORT=8720
    ports:
      - "8082:8080"
    networks:
      - seckill-net

  # =====================================================
  # 13. Nginx 前端静态资源
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - seckill-net

# =====================================================
# 数据卷
# =====================================================
volumes:
  mysql-master-data:
    driver: local
  mysql-slave-data:
    driver: local
  redis-data:
    driver: local
  es-data:
    driver: local
  nacos-data:
    driver: local

# =====================================================
# 自定义网络
# =====================================================
networks:
  seckill-net:
    driver: bridge