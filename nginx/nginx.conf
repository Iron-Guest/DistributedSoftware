# =====================================================
# 电商秒杀平台 - Nginx 配置
# =====================================================
# 负载均衡算法说明:
#   - 默认(不指定): 轮询 (Round Robin)，请求依次分发
#   - least_conn:   最少连接，优先发给连接数最少的服务器
#   - ip_hash:      按客户端 IP 哈希，同一 IP 始终访问同一服务器
#   - random:       随机分发
# 切换方式: 取消对应 upstream 块的注释，注释掉其他块
# =====================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式（带 upstream 信息，便于观察负载均衡效果）
    log_format upstream_log '$remote_addr - [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'upstream: $upstream_addr '
                            'response_time: $upstream_response_time';

    access_log /var/log/nginx/access.log upstream_log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # =====================================================
    # 负载均衡算法 1: 轮询 (Round Robin) — 默认推荐
    #   请求按顺序依次分发到各后端实例，简单均匀
    # =====================================================
    upstream backend_pool {
        server backend1:8080 weight=1;
        server backend2:8080 weight=1;
    }

    # =====================================================
    # 负载均衡算法 2: 最少连接 (Least Connections)
    #   优先将请求发给当前活跃连接数最少的服务器
    #   适合长连接或处理时间不均的场景
    # =====================================================
    # upstream backend_pool {
    #     least_conn;
    #     server backend1:8080 weight=1;
    #     server backend2:8080 weight=1;
    # }

    # =====================================================
    # 负载均衡算法 3: IP 哈希 (IP Hash)
    #   同一客户端 IP 始终路由到同一后端实例
    #   适合需要会话保持 (Session Sticky) 的场景
    # =====================================================
    # upstream backend_pool {
    #     ip_hash;
    #     server backend1:8080 weight=1;
    #     server backend2:8080 weight=1;
    # }

    # =====================================================
    # 负载均衡算法 4: 随机 (Random)
    #   随机选择一台后端服务器
    # =====================================================
    # upstream backend_pool {
    #     random;
    #     server backend1:8080 weight=1;
    #     server backend2:8080 weight=1;
    # }

    # =====================================================
    # 负载均衡算法 5: 加权轮询 (Weighted Round Robin)
    #   backend1 权重 3，backend2 权重 1
    #   backend1 处理约 75% 的请求
    # =====================================================
    # upstream backend_pool {
    #     server backend1:8080 weight=3;
    #     server backend2:8080 weight=1;
    # }

    server {
        listen 80;
        server_name localhost;

        # 前端静态资源
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # 后端 API 代理
        location /api/ {
            proxy_pass http://backend_pool/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}