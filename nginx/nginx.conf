# =====================================================
# 电商秒杀平台 - Nginx 配置 (动静分离版)
# =====================================================
# 负载均衡算法说明:
#   - 默认(不指定): 轮询 (Round Robin)
#   - least_conn:   最少连接
#   - ip_hash:      IP 哈希
# =====================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式（带 upstream 和缓存命中信息）
    log_format upstream_log '$remote_addr - [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent" '
                            'upstream: $upstream_addr '
                            'rt: $upstream_response_time '
                            'cache: $upstream_cache_status';

    access_log /var/log/nginx/access.log upstream_log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # =====================================================
    # Gzip 压缩（减少静态资源传输体积）
    # =====================================================
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript
               application/javascript application/json
               application/xml image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # =====================================================
    # 静态文件缓存（浏览器缓存）
    # =====================================================
    map $sent_http_content_type $expires_time {
        default                    off;
        text/css                   max;
        text/javascript            max;
        application/javascript     max;
        image/jpeg                 max;
        image/png                  max;
        image/gif                  max;
        image/svg+xml              max;
        image/x-icon               max;
        font/woff                  max;
        font/woff2                 max;
    }

    # =====================================================
    # 后端负载均衡池 — 通过 Gateway 网关
    # =====================================================
    upstream gateway_pool {
        server gateway:9000 weight=1;
    }

    # =====================================================
    # 静态资源代理缓存（Nginx 本地缓存）
    # =====================================================
    proxy_cache_path /var/cache/nginx/static levels=1:2
                     keys_zone=static_cache:50m
                     max_size=500m
                     inactive=1d
                     use_temp_path=off;

    server {
        listen 80;
        server_name localhost;

        # =====================================================
        # 动静分离: 静态文件 (CSS/JS/图片/字体)
        #   - 浏览器缓存 30 天
        #   - Nginx 本地缓存 1 天
        # =====================================================
        location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            add_header X-Static-Cache "HIT";
            access_log off;
        }

        # =====================================================
        # 动静分离: HTML 页面 (不缓存，确保实时更新)
        # =====================================================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # =====================================================
        # 后端 API 代理 (通过 Gateway 网关)
        # =====================================================
        location /api/ {
            proxy_pass http://gateway_pool/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # 禁用 API 响应的浏览器缓存
            add_header Cache-Control "no-store";
            add_header X-Dynamic "true";
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}